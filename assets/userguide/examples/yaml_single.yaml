name: yaml_single
segments:
  - plan_name: baseline
    length: 25
  - plan_name: shifted
    length: 15
plans:
  baseline:
    distribution:
      kind: univariate
      family: Normal
      parametrization_name: meanStd
      mu: 0.0
      sigma: 1.0
    state:
      type: baseline
  shifted:
    distribution:
      kind: univariate
      family: Normal
      parametrization_name: meanStd
      mu: 2.0
      sigma: 1.0
    state:
      type: shifted
